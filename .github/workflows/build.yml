name: Build 9emePRO APK

on:
  push:
    tags:
      - 'v*'          # Declenche sur les tags type v1.0, v1.1, etc.
  workflow_dispatch:   # Permet de lancer manuellement depuis GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Permissions gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Decoder le keystore depuis les Secrets GitHub
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          # Fail fast with a clear message if the secret was corrupted/truncated,
          # instead of letting a broken .jks reach the Gradle signing step.
          keytool -list -keystore app/keystore.jks -storepass "$KEYSTORE_PASSWORD" > /dev/null \
            || (echo "::error::Decoded keystore is invalid - the KEYSTORE_BASE64 secret is likely corrupted. See fix instructions." && exit 1)

      # 6. Build APK release signe
      - name: Build Release APK
        env:
          KEYSTORE_PATH:     app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # 7. Renommer l'APK proprement
      - name: Rename APK
        run: |
          mkdir -p release-output
          cp app/build/outputs/apk/release/app-release.apk \
             release-output/9emePRO-${{ github.ref_name }}.apk

      # 8. Publier dans GitHub Releases
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "9emePRO ${{ github.ref_name }}"
          body: |
            ## 9emePRO ${{ github.ref_name }}

            Application de preparation pour la 9eme annee fondamentale (Haiti).

            ### Installation
            1. Telecharger le fichier `.apk` ci-dessous
            2. Sur Android : Parametres → Securite → Autoriser les sources inconnues
            3. Ouvrir le fichier `.apk` et installer

            ### Matieres couvertes
            Maths, Comm. Creole, Comm. Francaise, Sciences Experimentales,
            Sciences Sociales, Anglais, Espagnol, Env. et Agriculture,
            EPS, Education Citoyenne, ETAP
          files: release-output/9emePRO-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
